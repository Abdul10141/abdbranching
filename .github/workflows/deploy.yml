name: Branch Based CI/CD

on:
  push:
    branches:
      #- dev
      #- uat
      - main

jobs:

  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build for PROD
        if: github.ref_name == 'main'
        run: echo "Building application for PRODUCTION environment..."

  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy for PROD
        if: github.ref_name == 'main'
        run: echo "Deploying to PRODUCTION..."
