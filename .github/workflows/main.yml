name: Branch Based CI/CD

on:
  push:
    branches:
      - dev
      - uat
      - main

jobs:

  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Identify Branch
        run: echo "Running build for branch ${{ github.ref_name }}"

      - name: Build for DEV
        if: github.ref_name == 'dev'
        run: echo "Building application for DEV environment..."

      - name: Build for UAT
        if: github.ref_name == 'uat'
        run: echo "Building application for UAT environment..."

      - name: Build for PROD
        if: github.ref_name == 'main'
        run: echo "Building application for PRODUCTION environment..."

  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: build   # ensures deploy runs after build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Identify Branch
        run: echo "Running deploy for branch ${{ github.ref_name }}"

      - name: Deploy to DEV
        if: github.ref_name == 'dev'
        run: echo "Deploying application to DEV environment..."

      - name: Deploy to UAT
        if: github.ref_name == 'uat'
        run: echo "Deploying application to UAT environment..."

      - name: Deploy to PROD
        if: github.ref_name == 'main'
        run: echo "Deploying application to PRODUCTION environment..."
